<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>企业资质知识库</title>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --text2: #64748b;
      --text3: #94a3b8;
      --border: #e2e8f0;
      --success: #16a34a; --success-bg: #dcfce7;
      --warning: #d97706; --warning-bg: #fef3c7;
      --danger: #dc2626;  --danger-bg: #fee2e2;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ====== 顶部搜索栏 ====== */
    .top-bar {
      position: sticky; top: 0; z-index: 10;
      background: var(--card);
      padding: 12px 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .top-title {
      font-size: 18px; font-weight: 700;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .search-box {
      display: flex; align-items: center;
      background: var(--bg);
      border-radius: 10px; padding: 0 12px;
    }
    .search-box input {
      flex: 1; border: none; background: transparent;
      padding: 10px 0; font-size: 15px; outline: none;
    }
    .search-icon { font-size: 16px; opacity: .5; }

    /* ====== 分类标签横向滚动 ====== */
    .cat-scroll {
      position: sticky; top: 108px; z-index: 9;
      background: var(--bg);
      padding: 10px 16px;
      overflow-x: auto; white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-tab {
      display: inline-block;
      padding: 7px 14px; margin-right: 8px;
      border-radius: 20px;
      font-size: 13px; font-weight: 500;
      background: var(--card);
      color: var(--text2);
      cursor: pointer; user-select: none;
      transition: all .2s;
    }
    .cat-tab.active {
      background: var(--primary);
      color: #fff;
    }

    /* ====== 排序与计数 ====== */
    .sort-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 16px 2px;
      font-size: 13px; color: var(--text2);
    }
    .sort-btns { display: flex; gap: 8px; }
    .sort-btn {
      border: none; background: none;
      padding: 4px 10px; border-radius: 6px;
      font-size: 12px; color: var(--text3); cursor: pointer;
    }
    .sort-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* ====== 文档列表 ====== */
    .doc-list { padding: 8px 16px 60px; }
    .doc-card {
      background: var(--card); border-radius: var(--radius);
      margin-bottom: 10px; padding: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      cursor: pointer; user-select: none;
      transition: box-shadow .2s;
    }
    .doc-card:active { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .doc-header {
      display: flex; align-items: center; gap: 12px;
    }
    .doc-icon { font-size: 28px; flex-shrink: 0; }
    .doc-info { flex: 1; min-width: 0; }
    .doc-title {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .doc-meta { margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      display: inline-block; padding: 2px 8px;
      background: var(--primary); color: #fff;
      border-radius: 4px; font-size: 11px;
    }
    .tag-gray { background: #e2e8f0; color: #475569; }
    .status-badge {
      flex-shrink: 0; padding: 4px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600;
    }
    .s-valid { background: var(--success-bg); color: var(--success); }
    .s-expiring { background: var(--warning-bg); color: var(--warning); }
    .s-expired { background: var(--danger-bg); color: var(--danger); }
    .s-permanent { background: #e0e7ff; color: #4338ca; }
    .expand-icon {
      font-size: 16px; color: var(--text3);
      transition: transform .2s; flex-shrink: 0;
    }
    .expand-icon.open { color: var(--primary); }

    /* ====== 详情展开区 ====== */
    .doc-detail {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .d-item { padding: 4px 0; }
    .d-label { font-size: 12px; color: var(--text3); display: block; }
    .d-value { font-size: 14px; margin-top: 2px; }
    .d-desc {
      margin-top: 10px; padding: 10px; background: var(--bg);
      border-radius: 8px; font-size: 13px; color: var(--text2);
      line-height: 1.7;
    }
    .btn-file {
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 10px 14px;
      background: var(--primary); color: #fff;
      border-radius: 8px; text-decoration: none;
      font-size: 13px; font-weight: 600;
    }
    .d-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
    .t-tag {
      padding: 3px 8px; background: #f1f5f9;
      border-radius: 4px; font-size: 11px; color: var(--text2);
    }

    /* ====== 空状态 ====== */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text3); font-size: 16px;
    }

    /* ====== 底部信息 ====== */
    .footer {
      text-align: center; padding: 20px 16px 30px;
      font-size: 12px; color: var(--text3);
    }
  </style>
</head>
<body>
  <!-- 顶部 -->
  <div class="top-bar">
    <div class="top-title">📋 企业资质知识库</div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索名称、编号、分公司、供应商...">
    </div>
  </div>

  <!-- 分类标签 -->
  <div class="cat-scroll" id="categoryTabs"></div>

  <!-- 排序栏 -->
  <div class="sort-bar">
    <span id="resultCount">共 0 条</span>
    <div class="sort-btns">
      <button class="sort-btn active" id="sort-updatedAt" onclick="switchSort('updatedAt')">最近更新</button>
      <button class="sort-btn" id="sort-title" onclick="switchSort('title')">按名称</button>
    </div>
  </div>

  <!-- 文档列表 -->
  <div class="doc-list" id="docList"></div>

  <!-- 底部 -->
  <div class="footer">数据来源：企业资质知识库 · 静态只读版本</div>

  <!-- 数据加载 -->
  <script src="data.js"></script>
  <script src="js/mobile.js"></script>
</body>
</html>
