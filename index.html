<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企业资质知识库</title>
  <link rel="stylesheet" href="/css/style.css?v=3">
</head>
<body>
  <div id="app">
    <!-- 移动端遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">📋</span>
        <span class="logo-text">资质知识库</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="dashboard" onclick="event.preventDefault();navigateTo('dashboard')">
          <span class="nav-icon">📊</span> 仪表盘
        </a>
        <a href="#" class="nav-item" data-view="documents" onclick="event.preventDefault();navigateTo('documents')">
          <span class="nav-icon">📁</span> 资质文档
        </a>
        <a href="#" class="nav-item" data-view="upload" id="navUpload" onclick="event.preventDefault();navigateTo('upload')">
          <span class="nav-icon">⬆️</span> 上传文档
        </a>
        <a href="#" class="nav-item" data-view="import" id="navImport" onclick="event.preventDefault();navigateTo('import')">
          <span class="nav-icon">📥</span> Excel导入
        </a>
      </nav>
      <div class="sidebar-section">
        <div class="sidebar-label">快速筛选</div>
        <a href="#" class="nav-item filter-link" data-category="营业执照" onclick="event.preventDefault();navigateTo('documents',{category:'营业执照'})">
          <span class="nav-icon">🏢</span> 营业执照
        </a>
        <a href="#" class="nav-item filter-link" data-category="许可证" onclick="event.preventDefault();navigateTo('documents',{category:'许可证'})">
          <span class="nav-icon">📜</span> 许可证
        </a>
        <a href="#" class="nav-item filter-link" data-category="供应商合同" onclick="event.preventDefault();navigateTo('documents',{category:'供应商合同'})">
          <span class="nav-icon">🤝</span> 供应商合同
        </a>
        <a href="#" class="nav-item filter-link" data-category="发明专利" onclick="event.preventDefault();navigateTo('documents',{category:'发明专利'})">
          <span class="nav-icon">💡</span> 发明专利
        </a>
        <a href="#" class="nav-item filter-link" data-category="荣誉证书" onclick="event.preventDefault();navigateTo('documents',{category:'荣誉证书'})">
          <span class="nav-icon">🏆</span> 荣誉证书
        </a>
        <a href="#" class="nav-item filter-link" data-category="保险保单" onclick="event.preventDefault();navigateTo('documents',{category:'保险保单'})">
          <span class="nav-icon">🛡️</span> 保险保单
        </a>
        <a href="#" class="nav-item filter-link" data-category="其他" onclick="event.preventDefault();navigateTo('documents',{category:'其他'})">
          <span class="nav-icon">📦</span> 其他
        </a>
      </div>
      <div class="sidebar-footer">
        <button class="btn btn-primary" onclick="buildMobileLink()" style="width:100%;margin-bottom:8px;font-size:13px;">📱 生成手机查看链接</button>
        <div class="version-info">v1.0.0</div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-search">
          <span class="search-icon">🔍</span>
          <input type="text" id="globalSearch" placeholder="搜索文档名称、编号、供应商...">
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="navigateTo('upload')" id="btnUpload">+ 上传</button>
        </div>
      </header>

      <!-- 视图容器 -->
      <div id="view-container">
        <!-- 动态渲染 -->
      </div>
    </main>
  </div>

  <!-- 文档详情弹窗 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal modal-large">
      <div class="modal-header">
        <h2 id="detailTitle">文档详情</h2>
        <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h2>编辑文档</h2>
        <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
      </div>
      <div class="modal-body" id="editBody"></div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js?v=3"></script>
<script>
if (typeof window.STATIC_DATA !== 'undefined') {
  // 检测是否在CloudStudio公网部署
  var host = window.location.hostname;
  window.IS_CLOUD_STUDIO = host.indexOf('codebuddy.work') !== -1 || host.indexOf('cloudstudio') !== -1;
  window.LAN_SERVER = 'http://192.168.21.122:3000';
  
  document.addEventListener('DOMContentLoaded', function() {
    var navUpload = document.getElementById('navUpload');
    var navImport = document.getElementById('navImport');
    var btnUpload = document.getElementById('btnUpload');
    if (navUpload) navUpload.style.display = 'none';
    if (navImport) navImport.style.display = 'none';
    if (btnUpload) btnUpload.style.display = 'none';
    
    if (window.IS_CLOUD_STUDIO) {
      // 侧边栏底部添加WiFi下载说明
      setTimeout(function() {
        var banner = document.createElement('div');
        banner.style.cssText = 'background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-top:16px;font-size:13px;color:#1e40af;text-align:center;';
        banner.innerHTML = '📥 <b>下载文件需连接同一WiFi</b><br><small>' + window.LAN_SERVER + '/m</small>';
        var sidebar = document.querySelector('.sidebar-bottom') || document.querySelector('.sidebar');
        if (sidebar) sidebar.appendChild(banner);
      }, 800);
    }
  });
}
</script>
</body>
</html>
